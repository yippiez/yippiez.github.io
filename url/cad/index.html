<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cad · openscad</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body { background: #e9ecf2; font-family: system-ui, sans-serif;
      user-select: none; -webkit-user-select: none; }
    #view { position: fixed; inset: 0; }
    #view canvas { display: block; }
    .overlay { position: fixed; top: 24px; left: 24px; z-index: 10; max-height: calc(100vh - 48px); overflow:auto; }

    .ocard{ --ts:#2563eb; --ts-soft:#e6edfb;
      position:relative; font-family:system-ui,sans-serif; color:#1c1c22; width:max-content }
    .otree-edges{position:absolute; top:0; left:0; pointer-events:none; overflow:visible; z-index:0}
    .ohead{ display:inline-flex; align-items:center; gap:.45rem; padding:.22rem .45rem; margin-bottom:.5rem;
      line-height:1; background:rgba(230,237,251,.42); border:1px solid rgba(37,99,235,.7); border-radius:6px;
      text-decoration:none; cursor:default; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px) }
    .otitle{font-size:.68rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ts); position:relative; top:.05em}
    .ogo{display:inline-flex; color:var(--ts); opacity:.6}
    .obody{padding-left:.4rem}
    .okids{list-style:none; margin:0; padding-left:1.5rem}
    .onode{position:relative}
    .orow{position:relative; z-index:1; display:flex; align-items:center; padding:.34rem 0}
    .ocontent{ min-width:0; display:inline-flex; align-items:center; gap:.32rem;
      padding:.2rem .42rem .2rem .34rem; line-height:1;
      background:rgba(255,255,255,.28); border:1px solid rgba(220,222,230,.45); border-radius:7px;
      box-shadow:0 2px 8px rgba(20,22,30,.06); cursor:default; border-left:2.5px solid var(--dot,#e6e6eb);
      backdrop-filter:blur(11px); -webkit-backdrop-filter:blur(11px);
      transition:box-shadow .15s, transform .15s, background .15s; }
    .ocontent.hit:hover{ transform:translateX(2px); background:rgba(255,255,255,.5); box-shadow:0 6px 16px rgba(20,22,30,.15); }
    .oico{color:var(--dot); flex:0 0 auto; display:inline-flex}
    .ocaret{display:inline-flex; align-items:center; color:#8b8f99; margin-right:1px; flex:0 0 auto; transition:transform .15s}
    .onode:not(.collapsed) > .orow > .ocontent > .ocaret{transform:rotate(90deg)}
    .onode.collapsed > .okids{display:none}
    .odim,.oval{font-family:ui-monospace,"SF Mono",monospace; font-size:.72rem; font-weight:600; color:#2b2f38; position:relative; top:.04em}
    .olbl{color:#7a7f8a; font-size:.58rem; text-transform:uppercase; letter-spacing:.04em; position:relative; top:.04em}
    .tip{position:fixed; z-index:50; max-width:340px; pointer-events:none; opacity:0; transform:translateX(-4px);
      transition:opacity .12s, transform .12s; background:#14161c; color:#e7ebf2;
      font-family:ui-monospace,"SF Mono",monospace; font-size:12px; line-height:1.45;
      border:1px solid rgba(255,255,255,.12); border-radius:9px; padding:8px 11px;
      box-shadow:0 10px 30px rgba(20,22,30,.28); white-space:pre-wrap}
    .tip.on{opacity:1; transform:translateX(0)}
  </style>
  <script type="importmap">
  { "imports": {
    "three": "../vendor/three.module.js",
    "three-mesh-bvh": "../vendor/three-mesh-bvh.module.js",
    "three-bvh-csg": "../vendor/three-bvh-csg.module.js"
  }}
  </script>
</head>
<body>
  <div id="view"></div>
  <div class="overlay"><div class="ocard" id="tree"></div></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from '../vendor/OrbitControls.js';
    import { Evaluator, Brush, ADDITION, SUBTRACTION, INTERSECTION } from 'three-bvh-csg';

    /* ---------- default source (also read from ?src=) ---------- */
    const DEFAULT_SRC = `$fn = 48;
difference() {
  union() {
    cube([80, 50, 18], center=true);
    translate([0, 0, 16]) cube([50, 50, 14], center=true);
  }
  translate([-24, 0, 0]) cylinder(h=40, r=4, center=true);
  translate([ 24, 0, 0]) cylinder(h=40, r=4, center=true);
}`;
    const src = new URLSearchParams(location.search).get('src') || DEFAULT_SRC;

    /* ---------- tokenizer ---------- */
    function tokenize(s){
      const re=/\s+|\/\/[^\n]*|\/\*[\s\S]*?\*\/|([0-9]*\.?[0-9]+)|([A-Za-z_$][A-Za-z0-9_$]*)|([()\[\]{},;:=]|[+\-*\/])/g;
      const toks=[]; let m;
      while((m=re.exec(s))){
        if(m[1]!==undefined) toks.push({t:'num', v:parseFloat(m[1])});
        else if(m[2]!==undefined) toks.push({t:'id', v:m[2]});
        else if(m[3]!==undefined) toks.push({t:'p', v:m[3]});
      }
      toks.push({t:'eof'}); return toks;
    }

    /* ---------- parser (recursive descent) ---------- */
    function parse(s){
      const tk=tokenize(s); let i=0;
      const peek=()=>tk[i], next=()=>tk[i++];
      const isP=v=>peek().t==='p'&&peek().v===v;
      const eat=v=>{ if(!isP(v)) throw new Error('expected '+v+' got '+JSON.stringify(peek())); i++; };

      function parsePrimary(){
        const t=peek();
        if(t.t==='num'){ next(); return {k:'num', v:t.v}; }
        if(t.t==='id'){ next(); return {k:'var', v:t.v}; }
        if(isP('(')){ eat('('); const e=parseExpr(); eat(')'); return e; }
        if(isP('[')){ // vector or range
          eat('['); const first=parseExpr();
          if(isP(':')){ eat(':'); const b=parseExpr(); let step=null,end=b;
            if(isP(':')){ eat(':'); end=parseExpr(); step=b; }
            eat(']'); return {k:'range', from:first, step, to:end};
          }
          const items=[first];
          while(isP(',')){ eat(','); items.push(parseExpr()); }
          eat(']'); return {k:'vec', items};
        }
        if(isP('-')){ next(); return {k:'neg', e:parsePrimary()}; }
        throw new Error('unexpected token '+JSON.stringify(t));
      }
      function parseMul(){ let l=parsePrimary();
        while(isP('*')||isP('/')){ const op=next().v; const r=parsePrimary(); l={k:'bin',op,l,r}; } return l; }
      function parseExpr(){ let l=parseMul();
        while(isP('+')||isP('-')){ const op=next().v; const r=parseMul(); l={k:'bin',op,l,r}; } return l; }

      function parseArgs(){
        const pos=[], named={};
        eat('(');
        while(!isP(')')){
          if(peek().t==='id' && tk[i+1].t==='p' && tk[i+1].v==='='){
            const name=next().v; eat('='); named[name]=parseExpr();
          } else pos.push(parseExpr());
          if(isP(',')) eat(','); else break;
        }
        eat(')'); return {pos, named};
      }
      function parseStatement(){
        // assignment:  name = expr ;
        if(peek().t==='id' && tk[i+1].t==='p' && tk[i+1].v==='='){
          const name=next().v; eat('='); const e=parseExpr(); if(isP(';')) eat(';');
          return {k:'assign', name, e};
        }
        // module call:  name ( args )  child?
        const name=next().v; const args=parseArgs();
        const node={k:'call', name, args, children:[]};
        if(isP('{')){ eat('{'); while(!isP('}')) node.children.push(parseStatement()); eat('}'); }
        else if(isP(';')) eat(';');
        else node.children.push(parseStatement()); // single child
        return node;
      }
      const stmts=[]; while(peek().t!=='eof') stmts.push(parseStatement());
      return stmts;
    }

    /* ---------- evaluate expressions ---------- */
    function ev(node, env){
      switch(node.k){
        case 'num': return node.v;
        case 'var': return (node.v in env)?env[node.v]:(node.v in vars?vars[node.v]:0);
        case 'neg': return -ev(node.e, env);
        case 'vec': return node.items.map(x=>ev(x, env));
        case 'bin': { const a=ev(node.l,env), b=ev(node.r,env);
          return node.op==='+'?a+b:node.op==='-'?a-b:node.op==='*'?a*b:a/b; }
        case 'range': { const f=ev(node.from,env), t=ev(node.to,env), s=node.step?ev(node.step,env):1;
          const out=[]; for(let v=f; v<=t+1e-9; v+=s) out.push(v); return out; }
      }
    }
    const vars={ $fn:32 };

    /* ---------- build geometry ---------- */
    const evaluator=new Evaluator(); evaluator.useGroups=false;
    const MAT=new THREE.MeshStandardMaterial({color:0x9fb0ef, metalness:0.25, roughness:0.45});

    function prim(name, a, env){
      const fn=Math.max(8, Math.round(('$fn' in env?env.$fn:vars.$fn)));
      let g;
      if(name==='cube'){
        let sz = a.pos[0]!==undefined?ev(a.pos[0],env):(a.named.size?ev(a.named.size,env):1);
        if(!Array.isArray(sz)) sz=[sz,sz,sz];
        const center=a.named.center?ev(a.named.center,env):0;
        g=new THREE.BoxGeometry(sz[0],sz[1],sz[2]);
        if(!center) g.translate(sz[0]/2,sz[1]/2,sz[2]/2);
      } else if(name==='sphere'){
        const r=a.named.r?ev(a.named.r,env):(a.pos[0]!==undefined?ev(a.pos[0],env):1);
        g=new THREE.SphereGeometry(r, fn, Math.max(6,fn>>1));
      } else if(name==='cylinder'){
        const h=a.named.h?ev(a.named.h,env):(a.pos[0]!==undefined?ev(a.pos[0],env):1);
        let r=a.named.r?ev(a.named.r,env):undefined;
        let r1=a.named.r1?ev(a.named.r1,env):(r!==undefined?r:(a.pos[1]!==undefined?ev(a.pos[1],env):1));
        let r2=a.named.r2?ev(a.named.r2,env):(r!==undefined?r:(a.pos[2]!==undefined?ev(a.pos[2],env):r1));
        const center=a.named.center?ev(a.named.center,env):0;
        g=new THREE.CylinderGeometry(r2, r1, h, fn);
        g.rotateX(Math.PI/2);              // OpenSCAD cylinders lie along +Z
        if(!center) g.translate(0,0,h/2);
      } else { g=new THREE.BoxGeometry(1,1,1); }
      return g;
    }

    function mat4(name, a, env){
      const m=new THREE.Matrix4();
      if(name==='translate'){ const v=ev(a.pos[0],env); m.makeTranslation(v[0]||0,v[1]||0,v[2]||0); }
      else if(name==='scale'){ let v=ev(a.pos[0],env); if(!Array.isArray(v)) v=[v,v,v]; m.makeScale(v[0],v[1],v[2]); }
      else if(name==='rotate'){ let v=ev(a.pos[0],env); if(!Array.isArray(v)) v=[0,0,v];
        const e=new THREE.Euler(v[0]*Math.PI/180, v[1]*Math.PI/180, v[2]*Math.PI/180, 'XYZ');
        m.makeRotationFromEuler(e); }
      return m;
    }

    const BOOL={union:ADDITION, difference:SUBTRACTION, intersection:INTERSECTION};

    function toBrush(geom){ const b=new Brush(geom, MAT); b.updateMatrixWorld(); return b; }

    // returns a Brush (world-space geometry baked) or null
    function evalNode(node, matrix, env){
      const n=node.name;
      if(n in BOOL){
        const brushes=node.children.map(c=>evalNode(c, matrix, env)).filter(Boolean);
        if(!brushes.length) return null;
        if(n==='union') return foldUnion(brushes);
        let res=brushes[0];
        for(let k=1;k<brushes.length;k++) res=evaluator.evaluate(res, brushes[k], BOOL[n]);
        return res;
      }
      if(n==='translate'||n==='rotate'||n==='scale'){
        const m=matrix.clone().multiply(mat4(n, node.args, env));
        return foldUnion(node.children.map(c=>evalNode(c, m, env)).filter(Boolean));
      }
      if(n==='for'){
        const nm=Object.keys(node.args.named)[0];
        const vals=ev(node.args.named[nm], env);
        const parts=[];
        for(const val of (Array.isArray(vals)?vals:[vals])){
          const e2=Object.assign({}, env); e2[nm]=val;
          parts.push(foldUnion(node.children.map(c=>evalNode(c, matrix, e2)).filter(Boolean)));
        }
        return foldUnion(parts.filter(Boolean));
      }
      // primitive
      const g=prim(n, node.args, env); g.applyMatrix4(matrix);
      return toBrush(g);
    }
    function foldUnion(brushes){
      brushes=brushes.filter(Boolean); if(!brushes.length) return null;
      let res=brushes[0]; for(let k=1;k<brushes.length;k++) res=evaluator.evaluate(res, brushes[k], ADDITION);
      return res;
    }

    /* ---------- run ---------- */
    const ast=parse(src);
    // top-level assignments (e.g. $fn) then geometry statements
    const geomNodes=[];
    for(const st of ast){ if(st.k==='assign'){ vars[st.name]=ev(st.e, {}); } else geomNodes.push(st); }
    const result=foldUnion(geomNodes.map(n=>evalNode(n, new THREE.Matrix4(), {})).filter(Boolean));

    /* ---------- scene ---------- */
    const view=document.getElementById('view');
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
    view.appendChild(renderer.domElement);
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0xe9ecf2);
    const camera=new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 5000);
    const controls=new OrbitControls(camera, renderer.domElement);
    controls.enableDamping=true; controls.dampingFactor=0.08; controls.autoRotate=true; controls.autoRotateSpeed=1.1;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x9098a8, 1.1));
    const dl=new THREE.DirectionalLight(0xffffff,1.7); dl.position.set(60,90,70); scene.add(dl);
    const dl2=new THREE.DirectionalLight(0xffffff,0.5); dl2.position.set(-50,-20,-40); scene.add(dl2);

    if(result){
      result.geometry.rotateX(-Math.PI/2);   // OpenSCAD Z-up -> Three.js Y-up
      const mesh=new THREE.Mesh(result.geometry, MAT);
      const edges=new THREE.LineSegments(new THREE.EdgesGeometry(result.geometry, 25),
        new THREE.LineBasicMaterial({color:0x4257b2, transparent:true, opacity:0.35}));
      mesh.add(edges);
      const box=new THREE.Box3().setFromObject(mesh); const c=box.getCenter(new THREE.Vector3());
      const size=box.getSize(new THREE.Vector3()); const maxd=Math.max(size.x,size.y,size.z);
      mesh.position.sub(c); scene.add(mesh);
      const grid=new THREE.GridHelper(maxd*3, 20, 0xc3c7d0, 0xd4d7de);
      grid.position.y=-size.y/2 - maxd*0.05; scene.add(grid);
      camera.position.set(maxd*1.4, maxd*1.15, maxd*1.6);
      controls.target.set(0,0,0);
    }
    addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
    (function loop(){ controls.update(); renderer.render(scene,camera); requestAnimationFrame(loop); })();

    /* ---------- build the tree overlay from the AST ---------- */
    const LBL={union:'bool',difference:'bool',intersection:'bool',translate:'xform',rotate:'xform',scale:'xform',
      for:'loop',cube:'prim',sphere:'prim',cylinder:'prim'};
    const DOT={bool:'#2563eb',xform:'#f59e0b',loop:'#d1476b',prim:'#4fae9a'};
    // --- primitives drawn as actual solids, booleans as operation symbols ---
    const SHAPE={
      cube:'<polygon points="8,1.6 13.4,4.7 8,7.9 2.6,4.7" fill="currentColor" fill-opacity=".38"/>'
          +'<polygon points="2.6,4.7 8,7.9 8,14.4 2.6,11.3" fill="currentColor" fill-opacity=".14"/>'
          +'<polygon points="13.4,4.7 8,7.9 8,14.4 13.4,11.3" fill="currentColor" fill-opacity=".24"/>'
          +'<path d="M8 1.6 13.4 4.7v6.6L8 14.4 2.6 11.3V4.7z" /><path d="M8 7.9v6.5M2.6 4.7 8 7.9l5.4-3.2"/>',
      cylinder:'<path d="M3.6 3.9v8.2a4.4 1.8 0 0 0 8.8 0V3.9" fill="currentColor" fill-opacity=".16"/>'
          +'<ellipse cx="8" cy="3.9" rx="4.4" ry="1.8" fill="currentColor" fill-opacity=".4"/>'
          +'<path d="M3.6 3.9v8.2a4.4 1.8 0 0 0 8.8 0V3.9"/><ellipse cx="8" cy="3.9" rx="4.4" ry="1.8"/>',
      sphere:'<circle cx="8" cy="8" r="5.1" fill="currentColor" fill-opacity=".2"/><circle cx="8" cy="8" r="5.1"/>'
          +'<path d="M3 7a7 3 0 0 0 10 0" opacity=".45"/><path d="M6.2 3.3a3.2 6 0 0 0 0 9.4" opacity=".45"/>'
    };
    const BOOLSYM={   // clear CSG operation symbols
      union:'<circle cx="6.3" cy="8" r="4.3" fill="currentColor" fill-opacity=".28"/><circle cx="9.7" cy="8" r="4.3" fill="currentColor" fill-opacity=".28"/>'
          +'<circle cx="6.3" cy="8" r="4.3"/><circle cx="9.7" cy="8" r="4.3"/>',
      difference:'<circle cx="6.3" cy="8" r="4.3" opacity=".4"/><circle cx="9.9" cy="8" r="4.3" opacity=".4"/>'
          +'<path fill="currentColor" stroke="none" fill-rule="evenodd" d="M2 8a4.3 4.3 0 1 1 8.6 0 4.3 4.3 0 1 1 -8.6 0Z M5.6 8a4.3 4.3 0 1 0 8.6 0 4.3 4.3 0 1 0 -8.6 0Z"/>',
      intersection:'<circle cx="6.3" cy="8" r="4.3" opacity=".4"/><circle cx="9.7" cy="8" r="4.3" opacity=".4"/>'
          +'<path fill="currentColor" stroke="none" d="M8 4.35a4.3 4.3 0 0 0 0 7.3 4.3 4.3 0 0 0 0-7.3Z"/>'
    };
    const XFORM={
      translate:'<path d="M8 2.4v11.2M2.4 8h11.2"/><path d="M8 2.4 6.5 4M8 2.4 9.5 4M8 13.6 6.5 12M8 13.6 9.5 12M2.4 8 4 6.5M2.4 8 4 9.5M13.6 8 12 6.5M13.6 8 12 9.5"/>',
      rotate:'<path d="M12.8 8a4.8 4.8 0 1 1-1.4-3.4"/><path d="M12.9 3.1v2.6h-2.6"/>',
      scale:'<path d="M3 7V3h4M13 9v4H9"/><path d="M3.2 3.2 7 7M12.8 12.8 9 9"/>',
      "for":'<path d="M4.2 6.6A4 4 0 0 1 11 4.7M11.8 9.4A4 4 0 0 1 5 11.3"/><path d="M11 3.2v2.2H8.8M5 12.8v-2.2h2.2"/>'
    };
    function iconSVG(inner,size){
      return '<svg class="oico" width="'+size+'" height="'+size+'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';
    }
    function primDims(node){
      const a=node.args, n=node.name;
      if(n==='cube'){ const s=a.pos[0]||a.named.size; if(s&&s.k==='vec') return s.items.map(fmtExpr).join('×'); return s?fmtExpr(s)+'³':''; }
      if(n==='cylinder'){ const h=a.named.h||a.pos[0]; const r=a.named.r||a.named.r1||a.pos[1];
        return (h?'h'+fmtExpr(h):'')+(r?' r'+fmtExpr(r):''); }
      if(n==='sphere'){ const r=a.named.r||a.pos[0]; return r?'r'+fmtExpr(r):''; }
      return '';
    }
    function chipHTML(node, kind){
      if(kind==='prim') return iconSVG(SHAPE[node.name]||'', 18)+'<span class="odim">'+primDims(node)+'</span>';
      if(kind==='bool') return iconSVG(BOOLSYM[node.name]||'', 18)+'<span class="olbl">'+node.name+'</span>';
      return iconSVG(XFORM[node.name]||'<circle cx="8" cy="8" r="4"/>', 15)+'<span class="oval">'+fmtArgs(node.args)+'</span>';
    }
    function fmtArgs(a){
      const parts=[];
      for(const p of a.pos) parts.push(fmtExpr(p));
      for(const k in a.named) parts.push(k+'='+fmtExpr(a.named[k]));
      return parts.join(', ');
    }
    function fmtExpr(e){
      if(e.k==='num') return (Math.round(e.v*100)/100)+'';
      if(e.k==='var') return e.v;
      if(e.k==='neg') return '-'+fmtExpr(e.e);
      if(e.k==='vec') return '['+e.items.map(fmtExpr).join(',')+']';
      if(e.k==='range') return '['+fmtExpr(e.from)+':'+(e.step?fmtExpr(e.step)+':':'')+fmtExpr(e.to)+']';
      if(e.k==='bin') return fmtExpr(e.l)+e.op+fmtExpr(e.r);
      return '';
    }
    function nodeEl(node){
      const kind=LBL[node.name]||'op'; const dot=DOT[kind]||'#94a3b8';
      const wrap=document.createElement('div'); wrap.className='onode';
      const row=document.createElement('div'); row.className='orow';
      const chip=document.createElement('div'); chip.className='ocontent hit'; chip.style.setProperty('--dot',dot);
      chip.innerHTML=chipHTML(node, kind);
      chip.setAttribute('data-code', node.name+'('+fmtArgs(node.args)+')'+(node.children.length?' { … }':''));
      row.appendChild(chip); wrap.appendChild(row);
      if(node.children && node.children.length){
        const kids=document.createElement('div'); kids.className='okids';
        node.children.forEach(c=> c.k==='call' && kids.appendChild(nodeEl(c)));
        wrap.appendChild(kids);
      }
      return wrap;
    }
    const tree=document.getElementById('tree');
    tree.innerHTML='<div class="ohead"><span class="otitle">model.scad</span></div>';
    const body=document.createElement('div'); body.className='obody okids';
    geomNodes.forEach(n=> n.k==='call' && body.appendChild(nodeEl(n)));
    tree.appendChild(body);

    // collapsible nodes (expanded by default)
    const CARET='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
    body.querySelectorAll('.onode').forEach(node=>{
      const sub = node.querySelector(':scope > .okids');
      const c = node.querySelector(':scope > .orow > .ocontent');
      if(!sub || !c) return;
      const caret=document.createElement('span'); caret.className='ocaret'; caret.innerHTML=CARET;
      c.insertBefore(caret, c.firstChild); c.style.cursor='pointer';
      c.addEventListener('click', ()=>{ node.classList.toggle('collapsed'); window.__drawTree && window.__drawTree(); });
    });
    window.__drawTree && window.__drawTree();

    // hover a command -> show its full source code
    const tip=document.createElement('div'); tip.className='tip'; document.body.appendChild(tip);
    tree.querySelectorAll('.ocontent[data-code]').forEach(el=>{
      el.addEventListener('mouseenter', ()=>{
        tip.textContent = el.getAttribute('data-code');
        const r = el.getBoundingClientRect();
        tip.style.left = (r.right + 12) + 'px';
        tip.style.top  = Math.min(r.top - 2, innerHeight - 60) + 'px';
        tip.classList.add('on');
      });
      el.addEventListener('mouseleave', ()=> tip.classList.remove('on'));
    });
  </script>

  <script>
  (function () {
    var SVGNS='http://www.w3.org/2000/svg';
    function kids(el,sel){return Array.prototype.filter.call(el.children,function(c){return c.matches(sel);});}
    function drawCard(card){
      var body=card.querySelector('.obody'),title=card.querySelector('.ohead');
      if(!body||!title)return;
      var svg=card.querySelector(':scope > .otree-edges');
      if(!svg){svg=document.createElementNS(SVGNS,'svg');svg.setAttribute('class','otree-edges');card.insertBefore(svg,card.firstChild);}
      var cr=card.getBoundingClientRect();
      function vis(el){return !!(el && el.getClientRects().length);}
      function chipOf(n){return n.querySelector(':scope > .orow > .ocontent');}
      function landing(n){var r=chipOf(n).getBoundingClientRect();return{x:r.left-cr.left,y:r.top-cr.top+r.height/2};}
      function spring(el){var r=el.getBoundingClientRect();return{x:r.left-cr.left+11,y:r.bottom-cr.top};}
      var d='';
      function link(a,container){var ch=kids(container,'.onode').filter(function(n){return vis(chipOf(n));});if(!ch.length)return;var pts=ch.map(landing);
        d+='M'+a.x+','+a.y+' V'+pts[pts.length-1].y;
        pts.forEach(function(c){var r=Math.min(8,Math.max(0,c.y-a.y),c.x-a.x);
          d+=' M'+a.x+','+(c.y-r)+' Q'+a.x+','+c.y+' '+(a.x+r)+','+c.y+' H'+c.x;});}
      link(spring(title),body);
      card.querySelectorAll('.onode').forEach(function(node){var sub=node.querySelector(':scope > .okids');if(sub&&vis(sub))link(spring(chipOf(node)),sub);});
      svg.setAttribute('width',card.offsetWidth);svg.setAttribute('height',card.offsetHeight);
      svg.innerHTML='<path d="'+d+'" fill="none" stroke="#c3c6cf" stroke-width="1.5" stroke-linecap="round"/>';
    }
    function drawAll(){document.querySelectorAll('.ocard').forEach(drawCard);}
    window.__drawTree=drawAll;
    addEventListener('load',drawAll); addEventListener('resize',drawAll);
  })();
  </script>
</body>

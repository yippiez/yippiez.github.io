<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>molecule</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body { background: #e9ecf2; font-family: system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
    #view { position: fixed; inset: 0; }
    #view canvas { display: block; }
    .overlay { position: fixed; top: 24px; left: 24px; z-index: 10; max-height: calc(100vh - 48px); overflow: auto; }

    .ocard{ --ts:#2563eb; --ts-soft:#e6edfb;
      position:relative; font-family:system-ui,sans-serif; color:#1c1c22; width:max-content }
    .otree-edges{position:absolute; top:0; left:0; pointer-events:none; overflow:visible; z-index:0}
    .ohead{ display:inline-flex; align-items:center; gap:.45rem; padding:.24rem .5rem; margin-bottom:.5rem;
      line-height:1; background:var(--ts-soft); border:1px solid var(--ts); border-radius:6px; text-decoration:none; cursor:default }
    .otitle{font-size:.74rem; font-weight:700; letter-spacing:.04em; color:var(--ts); position:relative; top:.05em}
    .obody{padding-left:.4rem}
    .okids{list-style:none; margin:0; padding-left:1.5rem}
    .onode{position:relative}
    .orow{position:relative; z-index:1; display:flex; align-items:center; padding:.26rem 0}
    .ocontent{ min-width:0; display:inline-flex; flex-wrap:wrap; align-items:center; gap:.28rem .45rem;
      padding:.3rem .55rem; line-height:1; background:#fff; border:1px solid #e6e6eb; border-radius:8px;
      box-shadow:0 1px 2px rgba(20,22,30,.06);
      transition:box-shadow .15s, transform .15s, border-color .15s; }
    .ocontent.el:hover{ transform:translateX(2px); box-shadow:0 4px 12px rgba(20,22,30,.14); border-color:var(--dot,#c9ccd4); }
    .oval{font-weight:700; color:#1c1c22; font-variant-numeric:tabular-nums; position:relative; top:.04em}
    .oval.mono{font-family:ui-monospace,"SF Mono",monospace; font-size:.8rem; font-weight:600}
    .olbl{color:#6b6b76; font-size:.74rem; position:relative; top:.04em}
    .swatch{width:9px;height:9px;border-radius:3px;background:var(--dot);flex:0 0 auto}
    .bar{display:block}.track{fill:#eceef2}
    .ocaret{display:inline-flex; align-items:center; color:#a2a8b2; margin-right:1px; flex:0 0 auto; transition:transform .15s}
    .onode:not(.collapsed) > .orow > .ocontent > .ocaret{transform:rotate(90deg)}
    .onode.collapsed > .okids{display:none}
    .ocontent.parent{cursor:pointer}
    .ocontent.parent:hover{border-color:#c9ccd4}
    .tip{position:fixed; z-index:50; max-width:262px; pointer-events:none; opacity:0; transform:translateX(-4px);
      transition:opacity .12s, transform .12s; background:#fff; color:#3a3f48; font-size:12.5px; line-height:1.5;
      border:1px solid #e6e6eb; border-radius:11px; padding:10px 13px; box-shadow:0 10px 30px rgba(20,22,30,.18); font-family:system-ui,sans-serif}
    .tip.on{opacity:1; transform:translateX(0)}
    .tip .tt{display:block; font-weight:700; color:#1c1c22; margin-bottom:4px; font-size:12.5px}
    #err{position:fixed; top:24px; left:24px; z-index:20; background:#fff; border:1px solid #e0463c; color:#b3261e;
      padding:10px 14px; border-radius:10px; font-size:13px; display:none; font-family:ui-monospace,monospace}
  </style>
  <script src="../vendor/RDKit_minimal.js"></script>
  <script type="importmap">{ "imports": { "three": "../vendor/three.module.js" } }</script>
</head>
<body>
  <div id="view"></div>
  <div class="overlay"><div class="ocard" id="tree"></div></div>
  <div id="err"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from '../vendor/OrbitControls.js';

    const ELEM = {
      H:{c:0xf2f4f7,r:0.23}, C:{c:0x8b909a,r:0.40}, N:{c:0x3b6ef2,r:0.42}, O:{c:0xe0463c,r:0.44},
      F:{c:0x53c06a,r:0.34}, P:{c:0xe8890c,r:0.48}, S:{c:0xe0b000,r:0.48}, Cl:{c:0x33ad5a,r:0.45},
      Br:{c:0xa0522d,r:0.50}, I:{c:0x8a3ff2,r:0.54}, B:{c:0xd8a06a,r:0.44}
    };
    const DEF = {c:0xc07fbf,r:0.46};
    const elInfo = e => ELEM[e] || DEF;
    const DOT = e => '#' + elInfo(e).c.toString(16).padStart(6,'0');

    // hand-built 3D coords for the default (ethanol) so the landing view looks nice
    const ETHANOL = {
      atoms:[ {e:'C',p:[-1.25,-0.20,0]},{e:'C',p:[0.05,0.55,0]},{e:'O',p:[1.22,-0.30,0]},
        {e:'H',p:[-2.10,0.45,0.30]},{e:'H',p:[-1.35,-0.85,0.88]},{e:'H',p:[-1.42,-0.72,-0.90]},
        {e:'H',p:[0.18,1.25,0.86]},{e:'H',p:[0.12,1.16,-0.86]},{e:'H',p:[1.98,0.26,0.12]} ],
      bonds:[[0,1,1],[1,2,1],[2,8,1],[0,3,1],[0,4,1],[0,5,1],[1,6,1],[1,7,1]]
    };

    const sub = s => String(s).replace(/[0-9]/g, d => '₀₁₂₃₄₅₆₇₈₉'[+d]);
    function hillFormula(counts){
      const keys = Object.keys(counts);
      const order = [];
      if (counts.C){ order.push('C'); if(counts.H) order.push('H'); }
      keys.filter(k=>k!=='C'&&!(counts.C&&k==='H')).sort().forEach(k=>order.push(k));
      return order.map(k => k + (counts[k]>1 ? sub(counts[k]) : '')).join('');
    }
    function parseMolblock(mb){
      const L = mb.split('\n'); const cnt = L[3];
      const na = parseInt(cnt.slice(0,3)), nb = parseInt(cnt.slice(3,6));
      const atoms=[], bonds=[];
      for(let i=0;i<na;i++){ const s=L[4+i];
        atoms.push({ e:s.slice(31,34).trim(),
          p:[parseFloat(s.slice(0,10)), parseFloat(s.slice(10,20)), parseFloat(s.slice(20,30))] }); }
      for(let i=0;i<nb;i++){ const s=L[4+na+i];
        bonds.push([parseInt(s.slice(0,3))-1, parseInt(s.slice(3,6))-1, parseInt(s.slice(6,9))]); }
      return {atoms,bonds};
    }

    const showErr = m => { const e=document.getElementById('err'); e.textContent=m; e.style.display='block'; };

    // ---- boot RDKit ----
    async function waitFor(fn){ for(let i=0;i<200;i++){ if(fn()) return; await new Promise(r=>setTimeout(r,25)); } }
    await waitFor(()=>window.initRDKitModule);
    const RDKit = await window.initRDKitModule({ locateFile: f => '../vendor/'+f });

    const params = new URLSearchParams(location.search);
    const smiles = params.get('smiles') || 'CCO';

    let mol = RDKit.get_mol(smiles);
    if (!mol || !mol.is_valid()){ showErr('Invalid SMILES: '+smiles); throw new Error('bad smiles'); }
    const d = JSON.parse(mol.get_descriptors());
    const canonical = mol.get_smiles();
    let inchikey = '—';
    try { inchikey = RDKit.get_inchikey_for_inchi(mol.get_inchi()); } catch(_){}

    // geometry: hand coords for ethanol, else RDKit connectivity + 2D layout
    let geom;
    if (canonical === 'CCO') geom = ETHANOL;
    else {
      const mh = RDKit.get_mol(smiles); mh.add_hs_in_place(); mh.set_new_coords();
      geom = parseMolblock(mh.get_molblock()); mh.delete();
    }
    // element counts (with H) for formula + breakdown
    const counts = {}; geom.atoms.forEach(a => counts[a.e]=(counts[a.e]||0)+1);
    const formula = hillFormula(counts);

    /* =================== 3D scene =================== */
    const view = document.getElementById('view');
    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth, innerHeight);
    view.appendChild(renderer.domElement);
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0xe9ecf2);
    const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 500);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.08; controls.autoRotate = true; controls.autoRotateSpeed = 1.3;
    scene.add(new THREE.HemisphereLight(0xffffff, 0x9098a8, 1.15));
    const dl = new THREE.DirectionalLight(0xffffff,1.6); dl.position.set(4,6,5); scene.add(dl);
    const dl2 = new THREE.DirectionalLight(0xffffff,0.5); dl2.position.set(-4,-2,-3); scene.add(dl2);

    // center + scale
    const c = new THREE.Vector3();
    geom.atoms.forEach(a => c.add(new THREE.Vector3(...a.p)));
    c.multiplyScalar(1/geom.atoms.length);
    const P = geom.atoms.map(a => new THREE.Vector3(...a.p).sub(c));
    let radius = 1; P.forEach(p => radius = Math.max(radius, p.length()));

    const byEl = {};
    const root = new THREE.Group(); scene.add(root);
    const sphereGeo = new THREE.SphereGeometry(1, 40, 28);
    geom.atoms.forEach((a,i) => {
      const info = elInfo(a.e);
      const mat = new THREE.MeshStandardMaterial({ color:info.c, metalness:0.15, roughness:0.35 });
      const m = new THREE.Mesh(sphereGeo, mat);
      m.scale.setScalar(info.r); m.position.copy(P[i]);
      root.add(m); (byEl[a.e] = byEl[a.e] || []).push(m);
    });
    const bondMat = new THREE.MeshStandardMaterial({ color:0x9aa0aa, metalness:0.1, roughness:0.6 });
    const cylGeo = new THREE.CylinderGeometry(0.085,0.085,1,20);
    const up = new THREE.Vector3(0,1,0);
    geom.bonds.forEach(([i,j]) => {
      const a=P[i], b=P[j], mid=a.clone().add(b).multiplyScalar(0.5), len=a.distanceTo(b);
      const m = new THREE.Mesh(cylGeo, bondMat);
      m.position.copy(mid); m.scale.y = len; m.quaternion.setFromUnitVectors(up, b.clone().sub(a).normalize());
      root.add(m);
    });
    const grid = new THREE.GridHelper(radius*6, 24, 0xc3c7d0, 0xd4d7de);
    grid.position.y = -radius - 0.6; scene.add(grid);
    const dist = radius / Math.sin(Math.PI/8) * 1.15;
    camera.position.set(dist*0.5, dist*0.42, dist*0.85); controls.target.set(0,0,0);
    addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

    /* =================== info overlay =================== */
    const TIP = {
      formula:['Molecular formula','The count of each element in one molecule. A compact fingerprint of composition — quick to read, though different isomers can share one.'],
      smiles:['Canonical SMILES','A plain-text encoding of the molecular graph. RDKit’s canonical form gives every molecule one unique string you can store, search, and share.'],
      inchi:['InChIKey','A fixed-length hashed identifier derived from the IUPAC InChI. Great as a database key — two identical structures always hash to the same key.'],
      exact:['Exact mass','Mass using the most abundant isotope of each atom, in daltons. This is what a high-resolution mass spectrometer actually measures.'],
      mw:['Molar mass','Average molecular weight (using natural isotope abundances), in g/mol. Used to convert between grams and moles when weighing or reacting.'],
      hbd:['Hydrogen-bond donors','Groups with an H on N or O that can donate a hydrogen bond. More donors usually means better water solubility but poorer membrane permeability (Lipinski).'],
      hba:['Hydrogen-bond acceptors','N or O atoms with lone pairs that can accept a hydrogen bond. With donors, they shape solubility, binding, and drug-likeness.'],
      rot:['Rotatable bonds','Single, non-ring bonds between heavy atoms — a measure of molecular flexibility. Fewer rotatable bonds often means better oral bioavailability.'],
      tpsa:['Topological polar surface area','The surface area (Å²) contributed by polar N/O atoms. Predicts passive membrane permeability; >140 Å² molecules rarely cross the gut wall.'],
      logp:['LogP (lipophilicity)','Crippen’s calculated octanol–water partition coefficient (log scale). Positive = fat-loving, negative = water-loving; it drives absorption and distribution.'],
      rings:['Rings','The number of ring systems (SSSR). Rings add rigidity and are central to most drug scaffolds.'],
      csp3:['Fraction Csp³','The share of carbons that are sp³ (tetrahedral) rather than flat/aromatic. Higher values correlate with better solubility and clinical success rates.'],
      heavy:['Heavy atoms','All atoms except hydrogen. A simple size measure and the basis of ligand efficiency metrics.'],
      atoms:['Atom count','Total number of atoms including hydrogens — a rough proxy for molecular size.'],
      elem:e=>[e, ({H:'The most abundant atom in most organic molecules; caps free valences and takes part in hydrogen bonding.',C:'The backbone element of organic molecules; its four-bond versatility builds chains and rings.',O:'Adds polarity and hydrogen-bonding; oxygen groups strongly raise water solubility and reactivity.',N:'Basic, hydrogen-bonding, and found in most drugs; carries lone pairs that bind metals and receptors.',S:'Larger and more polarizable; appears in many drugs, cofactors, and cross-links.'}[e] || ('Count of '+e+' atoms in the molecule.'))]
    };
    const barSVG = (frac,color,w=54)=>`<svg class="bar" width="${w}" height="8"><rect class="track" width="${w}" height="8" rx="4"/><rect width="${Math.max(2,Math.min(1,frac)*w).toFixed(1)}" height="8" rx="4" fill="${color}"/></svg>`;
    const gaugeSVG = v=>{const W=64,x=Math.max(0,Math.min(1,(v+5)/10))*W;return `<svg class="bar" width="${W}" height="12"><rect class="track" y="4" width="${W}" height="4" rx="2"/><line x1="${W/2}" y1="1" x2="${W/2}" y2="11" stroke="#c9ccd4" stroke-width="1"/><circle cx="${x.toFixed(1)}" cy="6" r="4" fill="#2563eb"/></svg>`;};

    function chip(opts){
      const c = document.createElement('div'); c.className='ocontent'+(opts.el?' el':'');
      if(opts.el){ c.dataset.el=opts.el; c.style.setProperty('--dot',opts.dot); }
      if(opts.swatch){ const s=document.createElement('span'); s.className='swatch'; if(!opts.el) c.style.setProperty('--dot',opts.dot); c.appendChild(s); }
      const v=document.createElement('span'); v.className='oval'+(opts.mono?' mono':''); v.textContent=opts.val; c.appendChild(v);
      if(opts.label){ const l=document.createElement('span'); l.className='olbl'; l.textContent=opts.label; c.appendChild(l); }
      if(opts.svg){ const w=document.createElement('span'); w.innerHTML=opts.svg; c.appendChild(w.firstChild); }
      if(opts.tip){ c.dataset.tt=opts.tip[0]; c.dataset.td=opts.tip[1]; c.style.cursor='help'; }
      return c;
    }
    const nodeOf = ch => { const n=document.createElement('div'); n.className='onode'; const r=document.createElement('div'); r.className='orow'; r.appendChild(ch); n.appendChild(r); return n; };
    function groupOf(parentChip, childChips){ const n=nodeOf(parentChip); const k=document.createElement('div'); k.className='okids'; childChips.forEach(ch=>k.appendChild(nodeOf(ch))); n.appendChild(k); return n; }

    const num = (x,p=2)=> (Math.round(x*10**p)/10**p).toString();

    const tree = document.getElementById('tree');
    tree.innerHTML = '<div class="ohead"><span class="otitle">'+formula+'</span></div>';
    const body = document.createElement('div'); body.className='obody okids';

    const elName = {H:'Hydrogen',C:'Carbon',O:'Oxygen',N:'Nitrogen',S:'Sulfur',P:'Phosphorus',F:'Fluorine',Cl:'Chlorine',Br:'Bromine',I:'Iodine',B:'Boron'};
    const elKeys = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
    const maxCount = Math.max(...elKeys.map(k=>counts[k]));

    // deep, mostly-collapsed spec
    const SPEC = [
      { val:'Identity', children:[
        { val:formula, label:'Formula', tip:TIP.formula },
        { val:canonical, mono:true, label:'SMILES', tip:TIP.smiles },
        { val:inchikey, mono:true, label:'InChIKey', tip:TIP.inchi },
        { val:'Mass', children:[
          { val:num(d.exactmw,4), label:'Exact mass', tip:TIP.exact },
          { val:num(d.amw,2), label:'g/mol', tip:TIP.mw, svg:barSVG(d.amw/500,'#2563eb') },
        ]},
      ]},
      { val:String(geom.atoms.length), label:'Atoms', tip:TIP.atoms, children:
        elKeys.map(e=>({ el:e, dot:DOT(e), swatch:true, val:String(counts[e]), label:elName[e]||e,
          tip:TIP.elem(e), svg:barSVG(counts[e]/maxCount, DOT(e)) }))
      },
      { val:'Druglikeness', children:[
        { val:'Lipinski Ro5', tip:['Lipinski’s rule of five','A rough oral-druglikeness filter: MW ≤ 500, LogP ≤ 5, ≤ 5 H-bond donors, ≤ 10 acceptors. Two or more violations predicts poor absorption.'], children:[
          { val:num(d.amw,1), label:'MW ≤ 500', tip:TIP.mw },
          { val:num(d.CrippenClogP,2), label:'LogP ≤ 5', tip:TIP.logp, svg:gaugeSVG(d.CrippenClogP) },
          { val:String(d.NumHBD), label:'HBD ≤ 5', tip:TIP.hbd },
          { val:String(d.NumHBA), label:'HBA ≤ 10', tip:TIP.hba },
        ]},
        { val:num(d.tpsa,1), label:'TPSA Å²', tip:TIP.tpsa, svg:barSVG(d.tpsa/140,'#7a4ff2') },
        { val:String(d.NumRotatableBonds), label:'Rotatable bonds', tip:TIP.rot },
        { val:num(d.FractionCSP3,2), label:'Fraction Csp³', tip:TIP.csp3, svg:barSVG(d.FractionCSP3,'#4fae9a') },
        { val:String(d.NumHeavyAtoms), label:'Heavy atoms', tip:TIP.heavy },
      ]},
      { val:'Rings & stereo', children:[
        { val:String(d.NumRings), label:'Rings', tip:TIP.rings },
        { val:String(d.NumAromaticRings), label:'Aromatic rings', tip:['Aromatic rings','Flat, conjugated rings (like benzene). They add rigidity and π-stacking, but too many hurt solubility.'] },
        { val:String(d.NumAliphaticRings), label:'Aliphatic rings', tip:['Aliphatic rings','Non-aromatic (saturated or partly saturated) rings — they add three-dimensional character.'] },
        { val:String(d.NumHeterocycles), label:'Heterocycles', tip:['Heterocycles','Rings containing at least one non-carbon atom (N, O, S). Extremely common in drug scaffolds.'] },
        { val:String(d.NumAtomStereoCenters), label:'Stereocenters', tip:['Stereocenters','Atoms whose 3-D arrangement isn’t superimposable on its mirror image; each one doubles the possible stereoisomers.'] },
        { val:String(d.NumSpiroAtoms), label:'Spiro atoms', tip:['Spiro atoms','A single atom shared between two rings joined at one point — a compact way to add 3-D shape.'] },
        { val:String(d.NumBridgeheadAtoms), label:'Bridgehead atoms', tip:['Bridgehead atoms','Atoms shared by two rings that share more than one bond (fused or bridged systems).'] },
      ]},
      { val:'Descriptors', children:[
        { val:'Crippen', children:[
          { val:num(d.CrippenClogP,3), label:'LogP', tip:TIP.logp },
          { val:num(d.CrippenMR,2), label:'Molar refractivity', tip:['Molar refractivity','Crippen’s MR — roughly molecular volume × polarizability. Tracks dispersion binding and steric bulk.'] },
        ]},
        { val:'Surface', children:[
          { val:num(d.tpsa,1), label:'TPSA Å²', tip:TIP.tpsa },
          { val:num(d.labuteASA,1), label:'Labute ASA', tip:['Labute ASA','An approximate accessible surface area (Å²) summed from atomic contributions.'] },
        ]},
        { val:'Shape κ', tip:['Kappa shape indices','Kier’s κ indices capture how linear vs. branched vs. cyclic a molecule is.'], children:[
          { val:num(d.kappa1,2), label:'κ1' }, { val:num(d.kappa2,2), label:'κ2' }, { val:num(d.kappa3,2), label:'κ3' },
          { val:num(d.hallKierAlpha,2), label:'Hall–Kier α' },
        ]},
        { val:'Connectivity χ', tip:['Chi connectivity indices','Molecular-graph descriptors encoding branching and valence, widely used in QSAR models.'], children:[
          { val:num(d.chi0v,2), label:'χ0v' }, { val:num(d.chi1v,2), label:'χ1v' },
          { val:num(d.chi0n,2), label:'χ0n' }, { val:num(d.chi1n,2), label:'χ1n' },
          { val:num(d.Phi,2), label:'Φ flexibility' },
        ]},
      ]},
    ];

    function build(spec){
      const n = nodeOf(chip(spec));
      if(spec.children && spec.children.length){
        const k=document.createElement('div'); k.className='okids';
        spec.children.forEach(cs=> k.appendChild(build(cs)));
        n.appendChild(k);
      }
      return n;
    }
    SPEC.forEach(cs=> body.appendChild(build(cs)));
    tree.appendChild(body);
    mol.delete();

    // collapse-by-default with clickable carets
    const CARET='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
    body.querySelectorAll('.onode').forEach(node=>{
      const sub = node.querySelector(':scope > .okids');
      const c = node.querySelector(':scope > .orow > .ocontent');
      if(!sub || !c) return;
      c.classList.add('parent');
      const caret=document.createElement('span'); caret.className='ocaret'; caret.innerHTML=CARET;
      c.insertBefore(caret, c.firstChild);
      node.classList.add('collapsed');
      c.addEventListener('click', ()=>{ node.classList.toggle('collapsed'); window.__drawTree && window.__drawTree(); });
    });

    // tooltips
    const tip = document.createElement('div'); tip.className='tip'; document.body.appendChild(tip);
    tree.querySelectorAll('.ocontent[data-tt]').forEach(el=>{
      el.addEventListener('mouseenter', ()=>{
        tip.innerHTML = '<span class="tt">'+el.dataset.tt+'</span>'+el.dataset.td;
        const r = el.getBoundingClientRect();
        tip.style.left = (r.right+12)+'px'; tip.style.top = Math.min(r.top, innerHeight-150)+'px';
        tip.classList.add('on');
      });
      el.addEventListener('mouseleave', ()=> tip.classList.remove('on'));
    });
    // element hover -> highlight atoms
    let hl = null;
    tree.querySelectorAll('.ocontent.el').forEach(el=>{
      el.addEventListener('mouseenter', ()=> hl = el.dataset.el);
      el.addEventListener('mouseleave', ()=> hl = null);
    });
    if (window.__drawTree) window.__drawTree();

    function tick(t){
      controls.update();
      for (const e in byEl) for (const m of byEl[e]){
        const on = hl===e;
        m.material.emissive.setHex(on?0x2563eb:0x000000);
        m.material.emissiveIntensity = on ? (0.35+0.25*Math.sin(t*0.006)) : 0;
        const base = elInfo(e).r, tgt = on?base*1.14:base;
        m.scale.setScalar(m.scale.x + (tgt-m.scale.x)*0.2);
      }
      renderer.render(scene,camera);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>

  <script>
  (function () {
    var SVGNS='http://www.w3.org/2000/svg';
    function kids(el,sel){return Array.prototype.filter.call(el.children,function(c){return c.matches(sel);});}
    function drawCard(card){
      var body=card.querySelector('.obody'),title=card.querySelector('.ohead');
      if(!body||!title)return;
      var svg=card.querySelector(':scope > .otree-edges');
      if(!svg){svg=document.createElementNS(SVGNS,'svg');svg.setAttribute('class','otree-edges');card.insertBefore(svg,card.firstChild);}
      var cr=card.getBoundingClientRect();
      function vis(el){return !!(el && el.getClientRects().length);}
      function chipOf(n){return n.querySelector(':scope > .orow > .ocontent');}
      function landing(n){var r=chipOf(n).getBoundingClientRect();return{x:r.left-cr.left,y:r.top-cr.top+r.height/2};}
      function spring(el){var r=el.getBoundingClientRect();return{x:r.left-cr.left+11,y:r.bottom-cr.top};}
      var d='';
      function link(a,container){var ch=kids(container,'.onode').filter(function(n){return vis(chipOf(n));});if(!ch.length)return;var pts=ch.map(landing);
        d+='M'+a.x+','+a.y+' V'+pts[pts.length-1].y;
        pts.forEach(function(c){var r=Math.min(8,Math.max(0,c.y-a.y),c.x-a.x);
          d+=' M'+a.x+','+(c.y-r)+' Q'+a.x+','+c.y+' '+(a.x+r)+','+c.y+' H'+c.x;});}
      link(spring(title),body);
      card.querySelectorAll('.onode').forEach(function(node){var sub=node.querySelector(':scope > .okids');if(sub&&vis(sub))link(spring(chipOf(node)),sub);});
      svg.setAttribute('width',card.offsetWidth);svg.setAttribute('height',card.offsetHeight);
      svg.innerHTML='<path d="'+d+'" fill="none" stroke="#c3c6cf" stroke-width="1.5" stroke-linecap="round"/>';
    }
    function drawAll(){document.querySelectorAll('.ocard').forEach(drawCard);}
    window.__drawTree=drawAll;
    addEventListener('load',drawAll); addEventListener('resize',drawAll);
  })();
  </script>
